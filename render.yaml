services:
  # Sports News API
  - type: web
    name: radio-coringao-news-api
    runtime: docker
    dockerfilePath: ./sports-news-api-ts/Dockerfile
    dockerContext: ./sports-news-api-ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: radio-coringao-db-news
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3007
    healthCheckPath: /api/health

  # Clube API
  - type: web
    name: radio-coringao-clube-api
    runtime: docker
    dockerfilePath: ./clube-api/Dockerfile
    dockerContext: ./clube-api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: radio-coringao-db-clube
          property: connectionString
      - key: JWT_SECRET
        fromService:
          name: radio-coringao-news-api
          property: JWT_SECRET
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3010
    healthCheckPath: /api/health

  # Frontend Next.js
  - type: web
    name: radio-coringao-frontend
    runtime: docker
    dockerfilePath: ./radio-coringao-frontend/Dockerfile
    dockerContext: ./radio-coringao-frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: radio-coringao-news-api
          property: externalUrl
        appendPath: /api
      - key: NEXT_PUBLIC_CLUBE_API_URL
        fromService:
          name: radio-coringao-clube-api
          property: externalUrl
        appendPath: /api
      - key: NEXT_PUBLIC_SITE_URL
        value: https://radiocoringao.com.br
      - key: NODE_ENV
        value: production
    healthCheckPath: /

databases:
  - name: radio-coringao-db-news
    plan: free
    databaseName: sports_news_db
    user: radio_coringao

  - name: radio-coringao-db-clube
    plan: free
    databaseName: clube_db
    user: radio_coringao
